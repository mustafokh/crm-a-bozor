# Azure Container Apps / App Service (Docker) uchun
# Volume: /data/auth_info ni persistent storage ga ulang

services:
  whatsapp:
    image: mkus-whatsapp-service:latest
    ports:
      - "8080:8080"
    environment:
      CRM_API_URL: ${CRM_API_URL}
      CRM_API_KEY: ${CRM_API_KEY}
      AUTH_DIR: /data/auth_info
      PORT: "8080"
      HOST: "0.0.0.0"
      IGNORE_GROUPS: "true"
    volumes:
      - whatsapp_auth:/data/auth_info
    restart: unless-stopped

volumes:
  whatsapp_auth:
