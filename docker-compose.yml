services:
  db:
    image: postgres:16-alpine
    container_name: mkus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mkus_crm
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  crm:
    build:
      context: .
      dockerfile: Dockerfile.compose
    container_name: mkus-crm
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mkus_crm?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET majburiy}
      CRM_API_KEY: ${CRM_API_KEY:?CRM_API_KEY majburiy}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-604800}
      SEED_DB: ${SEED_DB:-false}
    volumes:
      - crm-uploads:/app/public/uploads
    depends_on:
      - db

volumes:
  pg-data:
  crm-uploads:
