name: Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: mkus-crm-fed7cd
  AZURE_RESOURCE_GROUP: mkus-crm-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure Azure App Service
        run: |
          az webapp config appsettings set \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              NODE_ENV=production \
              WEBSITES_PORT=8080

          az webapp config set \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --startup-file "node server.js" \
            --always-on true

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Push database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          RULE="github-actions-${GITHUB_RUN_ID}"
          az postgres flexible-server firewall-rule create \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --server-name mkus-crm-db-c10b30 \
            --name "$RULE" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"
          npx prisma db push --skip-generate
          az postgres flexible-server firewall-rule delete \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --server-name mkus-crm-db-c10b30 \
            --name "$RULE" \
            --yes

      - name: Prepare standalone deploy package
        run: |
          STANDALONE=".next/standalone"
          cp -r public "$STANDALONE/public"
          cp -r .next/static "$STANDALONE/.next/static"
          cp -r prisma "$STANDALONE/prisma"
          cp scripts/azure-start.sh "$STANDALONE/start.sh"
          chmod +x "$STANDALONE/start.sh"

      - name: Wait for SCM to stabilize after config change
        run: sleep 90

      - name: Deploy pre-built package to Azure
        id: deploy
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .next/standalone

      - name: Deploy retry after SCM restart
        id: deploy_retry
        if: steps.deploy.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .next/standalone

      - name: Verify deploy succeeded
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ] || [ "${{ steps.deploy_retry.outcome }}" = "success" ]; then
            echo "Deploy succeeded"
          else
            echo "Deploy failed after retry"
            exit 1
          fi
